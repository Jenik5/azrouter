# ============================================================================
# custom_components/azrouter/services.yaml
# Service definitions for the AZ Router integration.
#
# Home Assistant uses this file to display service metadata in the UI
# (Developer Tools → Services). No logic lives here — only descriptions
# and field schemas.
# ============================================================================

set_master_boost:
  name: Master Boost
  description: Enable or disable Master Boost on the main AZ Router unit.
  fields:
    enabled:
      name: Enabled
      description: Set to true to enable Boost, false to disable it.
      required: true
      selector:
        boolean: {}

set_device_boost:
  name: Device Boost
  description: Enable or disable Boost on one or more devices.
  fields:
    device_id:
      name: Device
      description: Select one or more devices managed by the AZ Router integration.
      required: true
      selector:
        device:
          integration: azrouter
    enabled:
      name: Enabled
      description: Set to true to enable Boost, false to disable it.
      required: true
      selector:
        boolean: {}
set_device_type_1_block_solar_heating:
  name: Set Block Solar Heating
  description: Enable or disable block_solar_heating for a Smart Slave (deviceType=1)
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = block solar heating, False = allow solar heating
      required: true
      selector:
        boolean:

set_device_type_1_keep_heated:
  name: Set Keep Heated
  description: Enable or disable 3.1 Keep Heated (settings[*].power.ignore_cycle) for Smart Slave devices (deviceType=1).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = keep heated enabled, False = disabled.
      required: true
      selector:
        boolean: {}

set_device_type_1_block_heating_from_battery:
  name: Set Block Heating From Battery
  description: Enable or disable 3.3 Block Heating From Battery (settings[*].power.block_heating_from_battery) for Smart Slave devices (deviceType=1).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = block heating from battery, False = allow.
      required: true
      selector:
        boolean: {}

set_device_type_1_allow_solar_heating_only_in_time_window:
  name: Set Allow Solar Heating Only In Time Window
  description: Enable or disable 3.4 time-window constraint (settings[*].power.allowed_solar_heating_time.enabled) for Smart Slave devices (deviceType=1).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = allow only in configured time window, False = ignore time window.
      required: true
      selector:
        boolean: {}

set_device_type_1_boost_mode:
  name: Set Boost Mode
  description: Set 4.2 Boost Mode for Smart Slave devices (deviceType=1).
  target:
    device:
      integration: azrouter
  fields:
    mode:
      name: Mode
      description: One of manual, hdo, window, window+hdo (or numeric 0..3).
      required: true
      selector:
        select:
          mode: dropdown
          options:
            - label: Manual
              value: manual
            - label: HDO
              value: hdo
            - label: Window
              value: window
            - label: Window + HDO
              value: window+hdo

set_device_type_1_connected_phase:
  name: Set Connected Phase
  description: Connect or disconnect a specific boiler phase (1.1/1.2/1.3) for Smart Slave devices (deviceType=1).
  target:
    device:
      integration: azrouter
  fields:
    phase:
      name: Phase
      description: Phase number to modify (1, 2, or 3).
      required: true
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: box
    enabled:
      name: Enabled
      description: True = connect phase, False = disconnect phase.
      required: true
      selector:
        boolean: {}

set_device_type_1_max_power:
  name: Smart Slave – Max Power
  description: Set the maximum allowed load power for Smart Slave devices (deviceType=1).
  fields:
    device_id:
      name: Device
      description: Select a Smart Slave device (deviceType=1).
      required: true
      selector:
        device:
          integration: azrouter
    max_power:
      name: Max Power (W)
      description: Maximum power in watts (100–3500 W).
      required: true
      selector:
        number:
          min: 100
          max: 3500
          step: 25
          mode: box

set_device_type_1_temperatures:
  name: Smart Slave – Temperatures
  description: Set target and/or Boost temperatures for Smart Slave devices (deviceType=1).
  fields:
    device_id:
      name: Device
      description: Select a Smart Slave device (deviceType=1).
      required: true
      selector:
        device:
          integration: azrouter
    target_temperature:
      name: Target Temperature (°C)
      description: Normal operating target temperature (20–85 °C). Leave empty to skip.
      required: false
      selector:
        number:
          min: 20
          max: 85
          step: 5
          mode: box
    boost_temperature:
      name: Boost Temperature (°C)
      description: Boost-mode temperature (20–85 °C). Leave empty to skip.
      required: false
      selector:
        number:
          min: 20
          max: 85
          step: 5
          mode: box

set_device_type_4_block_charging:
  name: Wallbox – Block Charging
  description: Enable or disable 1. Block Charging for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = block charging, False = allow charging.
      required: true
      selector:
        boolean: {}

set_device_type_4_prioritize_when_connected:
  name: Wallbox – Prioritize When Connected
  description: Enable or disable 2. Prioritize When Connected (mode[0].enabled) for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = prioritize when connected, False = disable this mode.
      required: true
      selector:
        boolean: {}

set_device_type_4_block_solar_charging:
  name: Wallbox – Block Solar Charging
  description: Enable or disable 3. Block Solar Charging for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = block solar charging, False = allow solar charging.
      required: true
      selector:
        boolean: {}

set_device_type_4_block_charging_from_battery:
  name: Wallbox – Block Charging From Battery
  description: Enable or disable 4. Block Charging From Battery for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = block charging from battery, False = allow charging from battery.
      required: true
      selector:
        boolean: {}

set_device_type_4_allow_solar_charging_only_in_time_window:
  name: Wallbox – Allow Solar Charging Only In Time Window
  description: Enable or disable 6.1 time-window restriction for solar charging on Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = allow solar charging only in the configured time window, False = ignore the time window.
      required: true
      selector:
        boolean: {}

set_device_type_4_trigger_phase:
  name: Wallbox – Triggering Phase
  description: Set 5. Triggering Phase for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    phase:
      name: Phase
      description: Trigger phase to use (L1, L2, or L3).
      required: true
      selector:
        select:
          mode: dropdown
          options:
            - label: L1
              value: L1
            - label: L2
              value: L2
            - label: L3
              value: L3

set_device_type_4_apply_only_if_cloud_is_offline:
  name: Wallbox – Apply Only If Cloud Is Offline
  description: Enable or disable 8. Apply Only If Cloud Is Offline for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = apply only when cloud is offline, False = always apply.
      required: true
      selector:
        boolean: {}

set_device_type_4_time_window_charging_enabled:
  name: Wallbox – Time Window Charging Enabled
  description: Enable or disable 9.1 Time Window Charging Enabled (mode[2].enabled) for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = enable time window charging mode, False = disable it.
      required: true
      selector:
        boolean: {}

set_device_type_4_hdo_charging_enabled:
  name: Wallbox – HDO Charging Enabled
  description: Enable or disable 10.1 HDO Charging Enabled (mode[3].enabled) for Wallbox devices (deviceType=4).
  target:
    device:
      integration: azrouter
  fields:
    enabled:
      name: Enabled
      description: True = enable HDO charging mode, False = disable it.
      required: true
      selector:
        boolean: {}

set_device_type_4_manual_power:
  name: Wallbox – Manual Charging Power
  description: Set the manual charging power limit for Wallbox devices (deviceType=4). The allowed range depends on the installed circuit breaker.
  fields:
    device_id:
      name: Device
      description: Select a Wallbox device (deviceType=4).
      required: true
      selector:
        device:
          integration: azrouter
    manual_power:
      name: Manual Charging Power (W)
      description: Charging power in watts. The allowed range is dynamically validated inside the integration based on the circuit breaker rating.
      required: true
      selector:
        number:
          min: 1400
          max: 7400
          step: 100
          mode: box

# End Of File
